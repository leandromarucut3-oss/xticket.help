<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝕏 Security | Manual Verification</title>
    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            text-align: left;
        }
        .x-logo {
            font-size: 30px;
            margin-bottom: 30px;
            text-align: center;
        }
        h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        p {
            font-size: 15px;
            color: #71767B;
            line-height: 1.4;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 30px;
        }
        .input-label {
            display: block;
            font-size: 13px;
            color: #1D9BF0;
            margin-bottom: 8px;
            font-weight: bold;
        }
        input[type="text"] {
            width: 100%;
            background-color: #000000;
            border: 1px solid #333639;
            border-radius: 4px;
            padding: 16px;
            color: #FFFFFF;
            font-size: 18px;
            font-family: monospace;
            letter-spacing: 4px;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #1D9BF0;
            outline: none;
        }
        .verify-btn {
            width: 100%;
            background-color: #FFFFFF;
            color: #000000;
            border: none;
            border-radius: 9999px;
            padding: 14px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .verify-btn:hover {
            background-color: #E6E6E6;
        }
        .footer-links {
            margin-top: 40px;
            font-size: 13px;
            color: #1D9BF0;
            text-align: center;
        }
        .status-tag {
            display: inline-block;
            background: rgba(29, 155, 240, 0.1);
            color: #1D9BF0;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="x-logo">𝕏</div>
    
    <div class="status-tag">System Trace: Active</div>
    
    <h1>Enter the Sync Code</h1>
    
    <p>A manual 6-digit verification code has been dispatched via <strong>SMS/Secure-Email</strong>. Input the code to finalize the API handshake and re-secure your account registry.</p>

    <div class="input-group">
        <label class="input-label">SYNC AUTHENTICATION CODE</label>
        <input type="text" placeholder="· · · · · ·" maxlength="6">
    </div>

    <button class="verify-btn">Synchronize Account</button>

    <div class="footer-links">
        Didn't receive the packet? <br>
        <span style="color: #71767B; font-size: 11px; margin-top: 10px; display: block;">
            Request Manual Override via Assigned Agent
        </span>
    </div>
</div>

</body>
</html>
